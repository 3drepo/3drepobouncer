name: Deploy Bouncer to Staging

on:
  workflow_run:
    workflows: ["Build and Push Bouncer"]
    types: [completed]

  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  pre-deploy:
    # Auto-deploy on successful tag builds; manual deploy via /deploy-bouncer [tag] on PRs
    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        startsWith(github.event.comment.body, '/deploy-bouncer') &&
        github.event.issue.pull_request != null
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      # ---------------------------------------------------------------
      # STEP 1: Restrict to org members
      # ---------------------------------------------------------------
      - name: Check organization membership
        id: check_org
        run: |
          ORG="3drepo"
          USER="${{ github.actor }}"

          echo "Checking if $USER belongs to $ORG..."

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/$ORG/members/$USER)

          if [ "$STATUS" = "204" ] || [ "$STATUS" = "302" ]; then
            echo "User $USER is a member of $ORG."
          else
            echo "User $USER is not a member of $ORG (HTTP $STATUS)."
            exit 1
          fi

      # ---------------------------------------------------------------
      # STEP 2: Add comment reaction and feedback (if triggered by comment)
      # ---------------------------------------------------------------
      - name: React and comment on PR
        if: github.event_name == 'issue_comment'
        run: |
          PR_NUMBER=$(jq -r .issue.number < "$GITHUB_EVENT_PATH")
          COMMENT_ID=$(jq -r .comment.id < "$GITHUB_EVENT_PATH")
          REPO_FULL_NAME="${{ github.repository }}"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.squirrel-girl-preview+json" \
            https://api.github.com/repos/$REPO_FULL_NAME/issues/comments/$COMMENT_ID/reactions \
            -d '{"content":"rocket"}'

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO_FULL_NAME/issues/$PR_NUMBER/comments \
            -d '{"body":"Staging deploy triggered for `/deploy-bouncer` by @'${{ github.actor }}' — workflow is running..."}'

      # ---------------------------------------------------------------
      # STEP 3: Resolve the image tag to deploy
      # ---------------------------------------------------------------
      - name: Set deploy metadata
        id: vars
        env:
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            # workflow_run on a tag push: head_branch holds the tag name
            IMAGE_TAG="$WORKFLOW_HEAD_BRANCH"
          elif [[ "${GITHUB_EVENT_NAME}" == "issue_comment" ]]; then
            COMMENT_BODY=$(jq -r .comment.body < "$GITHUB_EVENT_PATH")
            # Allow /deploy-bouncer <tag> to specify an explicit tag; fall back to PR branch
            EXPLICIT_TAG=$(echo "$COMMENT_BODY" | awk '{print $2}')
            if [ -n "$EXPLICIT_TAG" ] && [ "$EXPLICIT_TAG" != "null" ]; then
              if [[ "$EXPLICIT_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
                IMAGE_TAG="$EXPLICIT_TAG"
              else
                echo "Invalid explicit image tag: only letters, numbers, dot, underscore, and hyphen are allowed"
                exit 1
              fi
            else
              ISSUE_NUMBER=$(jq -r .issue.number < "$GITHUB_EVENT_PATH")
              IMAGE_TAG=$(curl -s \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/$ISSUE_NUMBER" | jq -r .head.ref)
              if [ "$IMAGE_TAG" = "null" ] || [ -z "$IMAGE_TAG" ]; then
                echo "Failed to resolve image tag from PR branch"
                exit 1
              fi
            fi
          fi

          if [[ "$IMAGE_TAG" == *$'\n'* || "$IMAGE_TAG" == *$'\r'* ]]; then
            echo "Resolved image tag contains unsupported newline characters"
            exit 1
          fi

          printf 'image_tag=%s\n' "$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "######################################################"
          echo "Deploy Information:"
          echo "Image Tag: $IMAGE_TAG"
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "######################################################"

  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------
      # STEP 1: Checkout DevOps repo (sparse) for staging values file
      # ---------------------------------------------------------------
      - name: Checkout DevOps repo
        uses: actions/checkout@v4
        with:
          repository: 3drepo/DevOps
          token: ${{ secrets.PROJ_MANAGEMENT_TOKEN }}
          sparse-checkout: deployments/asite-stg/helm/bouncer
          sparse-checkout-cone-mode: false

      # ---------------------------------------------------------------
      # STEP 2: Setup Helm
      # ---------------------------------------------------------------
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.10.3'

      # ---------------------------------------------------------------
      # STEP 3: Set Kubernetes context
      # ---------------------------------------------------------------
      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      # ---------------------------------------------------------------
      # STEP 4: Login to ACR for Helm OCI chart pull
      # ---------------------------------------------------------------
      - name: Login to ACR
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | helm registry login "${{ secrets.REGISTRY_LOGIN_SERVER }}" \
            -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      # ---------------------------------------------------------------
      # STEP 5: Deploy Helm chart
      # ---------------------------------------------------------------
      - name: Deploy Helm chart
        env:
          IMAGE_TAG: ${{ needs.pre-deploy.outputs.image_tag }}
        run: |
          helm upgrade --install \
            --version 5.22.2 \
            www-bouncer \
            oci://${{ secrets.REGISTRY_LOGIN_SERVER }}/helm/bouncer \
            --namespace default \
            -f deployments/asite-stg/helm/bouncer/values.yaml \
            --set "image.tag=$IMAGE_TAG" \
            --wait

      # ---------------------------------------------------------------
      # STEP 6: Cleanup
      # ---------------------------------------------------------------
      - name: Logout from ACR
        if: always()
        run: helm registry logout "${{ secrets.REGISTRY_LOGIN_SERVER }}"
