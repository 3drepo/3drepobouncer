name: "Run Unit Tests"

on: [push]

jobs:
  unit-and-integration-tests:
    runs-on: ubuntu-24.04    

    env:
      TEST_DATA: ${{github.WORKSPACE}}/tests/cplusplus
      REPO_MODEL_PATH: ${{github.WORKSPACE}}/tests/cplusplus/bouncer/data/models
      MONGO_ROOT: ${{github.WORKSPACE}}/mongo-cxx-driver
      ASSIMP_ROOT: ${{github.WORKSPACE}}/assimp
      IFCOPENSHELL_ROOT: ${{github.WORKSPACE}}/IfcOpenShell
      ODA_ROOT: ${{github.WORKSPACE}}/teighaLinuxGCC8.3
      ODA_LIB_DIR: ${{github.WORKSPACE}}/teighaLinuxGCC8.3/lib/lnxX64_8.3dll/
      THRIFT_ROOT: ${{github.WORKSPACE}}/thrift-0.12.0
      DATE_ROOT: ${{github.WORKSPACE}}/date
      SYNCHRO_READER_ROOT: ${{github.WORKSPACE}}/3drepoSynchroReader
      REPOBOUNCER_ROOT: ${{github.WORKSPACE}}/install
      BOUNCER: ${{github.WORKSPACE}}/3drepobouncer
      SYNCHRO_PLUGIN_LOCATION: ${{github.WORKSPACE}}/3drepobouncer/plugins # The plugins subfolder is created by package_release

    steps:
      - name: Checkout bouncer
        uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{secrets.REPO_INSTALLER_TOKEN}} #The installer token is required to get the Asset_generator and other private submodules

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install gnupg curl libboost-all-dev tk-dev tcl-dev libxmu-dev libxi-dev libcgal-dev libocct-data-exchange-dev libocct-draw-dev libocct-foundation-dev libocct-modeling-algorithms-dev libocct-modeling-data-dev libocct-ocaf-dev libocct-visualization-dev libgmp-dev libmpfr-dev libxml2-dev libeigen3-dev zlib1g-dev libssl-dev libxft-dev

      - name: Install Microsoft Fonts
        run: |
          sudo apt-get install -y --no-install-recommends software-properties-common
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer fontconfig
          sudo fc-cache -f -v

      # For performance reasons, we cache the checkout of the tests repo, since it is faster
      # to load it from cache than to clone it via git, and it rarely changes within a
      # branch.

      - name: Try to restore tests repo
        id: restore-tests
        uses: actions/cache/restore@v5
        with:
          path: tests/cplusplus/bouncer
          key: MyTestKey # replace this with the master sha

      - name: Checkout tests repo
        if: steps.restore-tests.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: 3drepo/tests
          token: ${{secrets.REPO_INSTALLER_TOKEN}}
          path: tests
          sparse-checkout: cplusplus/bouncer
          lfs: true

      # We manually push the cache here, because otherwise additional files get
      # written to the fileShare folder during the unit tests

      - name: Cache tests repo
        if: steps.restore-tests.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: tests/cplusplus/bouncer
          key: ${{ steps.restore-tests.outputs.cache-primary-key }}

      - name: Replace REPO_MODEL_PATH in test configs
        run: for f in $REPO_MODEL_PATH/*.json; do sed -i.bak -e 's|$REPO_MODEL_PATH|'$REPO_MODEL_PATH'|g' $f; done

      - name: Unpack the dependencies in the tests repo
        run: |
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/mongo-cxx-driver.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/assimp-5.4.3.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/IfcOpenShell-0.8.0.tgz
          cat $TEST_DATA/bouncer/ext_libs/focal/teigha/2026.9/teighaLinuxGCC8.3.tgz* | tar -zxf -
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/thrift-0.12.0.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/3drepoSynchroReader.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/focal/date.tgz

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: 8.0
          mongodb-username: testUser
          mongodb-password: 3drepotest

      # Mongo does not maintain a package so we must install the tools to restore the database
      # following these instructions:
      # https://www.mongodb.com/docs/database-tools/installation/?operating-system=linux&package-type=deb
      - name: Install MongoDB Tools
        run: |
          curl -O https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2404-x86_64-100.14.1.deb
          sudo apt install ./mongodb-database-tools-ubuntu2404-x86_64-100.14.1.deb

      - name: Restore Test Database
        run: cd $TEST_DATA/bouncer/data/database && mongorestore -u "testUser" -p "3drepotest" --authenticationDatabase admin --quiet

      - name: Create build directory
        run: mkdir build && cd build

      - name: Run cmake
        working-directory: ./build
        run: cmake -DREPO_BUILD_TOOLS=ON -DREPO_BUILD_CLIENT=ON -DREPO_BUILD_TESTS=ON -DREPO_BUILD_COVERAGE=ON -DODA_SUPPORT=ON -DCMAKE_BUILD_TYPE=Release -DSYNCHRO_SUPPORT=ON -DCMAKE_INSTALL_PREFIX=$REPOBOUNCER_ROOT ../

      - name: Build
        working-directory: ./build
        run: sudo make -j 8 install

      - name: Package bouncer
        working-directory: ./tools/release
        run: node package_release.js $BOUNCER

      - name: Add Bouncer to PATH
        shell: bash
        run: echo $BOUNCER >> $GITHUB_PATH

      - name: Create fileShare symbolic link
        run: ln -s $REPO_MODEL_PATH/fileShare fileShare

      - name: Clone GTest Parallel Runner
        uses: actions/checkout@v6
        with:
          repository: google/gtest-parallel
          path: gtp

      - name: Copy GTest Parallel Runner to workspace
        run: mv ./gtp/* .

      - name: Run Tests
        env:
          LD_LIBRARY_PATH: ${{github.WORKSPACE}}/3drepobouncer
        run: ./gtest-parallel ./3drepobouncer/3drepobouncerTest --gtest_filter=-Geometry.*



        



