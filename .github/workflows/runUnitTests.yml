name: "Run Unit Tests"

on: [push]

jobs:
  unit-and-integration-tests:
    runs-on: ubuntu-24.04    

    env:
      TEST_DATA: $GITHUB_WORKSPACE/testData
      REPO_MODEL_PATH: $GITHUB_WORKSPACE/testData/bouncer/data/models
      MONGO_ROOT: $GITHUB_WORKSPACE/mongo-cxx-driver
      ASSIMP_ROOT: $GITHUB_WORKSPACE/assimp
      IFCOPENSHELL_ROOT: $GITHUB_WORKSPACE/IfcOpenShell
      ODA_ROOT: $GITHUB_WORKSPACE/teighaLinuxGCC8.3
      ODA_LIB_DIR: $GITHUB_WORKSPACE/teighaLinuxGCC8.3/lib/lnxX64_8.3dll/
      THRIFT_ROOT: $GITHUB_WORKSPACE/thrift-0.12.0
      DATE_ROOT: $GITHUB_WORKSPACE/date
      SYNCHRO_READER_ROOT: $GITHUB_WORKSPACE/3drepoSynchroReader
      BOUNCER_INSTALL: $GITHUB_WORKSPACE/install
      BOUNCER: $GITHUB_WORKSPACE/3drepobouncer
      SYNCHRO_PLUGIN_LOCATION: $GITHUB_WORKSPACE/3drepobouncer/plugins

    steps:
      - name: "Checkout bouncer"
        uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{secrets.REPO_INSTALLER_TOKEN}}
  
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: 8.0
          mongodb-username: testUser
          mongodb-password: 3drepotest

      - name: Install packages
        run: sudo apt-get install gnupg curl mongodb-org-tools libboost-all-dev tk-dev tcl-dev libxmu-dev libxi-dev libcgal-dev libocct-data-exchange-dev libocct-draw-dev libocct-foundation-dev libocct-modeling-algorithms-dev libocct-modeling-data-dev libocct-ocaf-dev libocct-visualization-dev libgmp-dev libmpfr-dev libxml2-dev libeigen3-dev zlib1g-dev libssl-dev libxft-dev

      - name: Install Microsoft Fonts
        run: |
          sudo apt-get install -y --no-install-recommends software-properties-common
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer fontconfig
          sudo fc-cache -f -v

      - name: Checkout Tests Repo into testData
        uses: actions/checkout@v6
        with:
          repository: 3drepo/tests
          token: ${{secrets.REPO_INSTALLER_TOKEN}}
          path: testData
          sparse-checkout: cplusplus/bouncer
          lfs: true

      - name: Restore Test Database
        run: cd $TEST_DATA/bouncer/data/database && mongorestore -u "testUser" -p "3drepotest" --authenticationDatabase admin --quiet

      - name: Unpack the dependencies in the Test Repo
        run: |
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/mongo-cxx-driver.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/assimp-5.4.3.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/IfcOpenShell-0.8.0.tgz
          cat $TEST_DATA/bouncer/ext_libs/focal/teigha/2026.9/teighaLinuxGCC8.3.tgz* | tar -zxf -
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/thrift-0.12.0.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/noble/3drepoSynchroReader.tgz
          tar -zxf $TEST_DATA/bouncer/ext_libs/focal/date.tgz

      - name: Create build directory
        run: mkdir build && cd build

      - name: Run cmake
        working-directory: ./build
        run: cmake -DREPO_BUILD_TOOLS=ON -DREPO_BUILD_CLIENT=ON -DREPO_BUILD_TESTS=ON -DREPO_BUILD_COVERAGE=ON -DODA_SUPPORT=ON -DCMAKE_BUILD_TYPE=Release -DSYNCHRO_SUPPORT=ON -DCMAKE_INSTALL_PREFIX=$BOUNCER_INSTALL ../

      - name: Build
        working-directory: ./build
        run: sudo make -j 8 install

      - name: Replace REPO_MODEL_PATH in Tests Configs
        run: for f in $REPO_MODEL_PATH/*.json; do sed -i.bak -e 's|$REPO_MODEL_PATH|'$REPO_MODEL_PATH'|g' $f; done

      - name: Package
        working-directory: ./tools/release $BOUNCER
        run: node package_release.js

      - name: Create fileshare symbolic link
        run: ln -s $REPO_MODEL_PATH/fileShare fileShare

      - name: Run Tests
        env:
          LD_LIBRARY_PATH: $BOUNCER
          PATH: $BOUNCER:$PATH
        run: ./3drepobouncer/3drepobouncerTest --gtest_filter=-Geometry.*





        



